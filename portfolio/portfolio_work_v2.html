<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Work — PRSN Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&family=Oswald:wght@700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#0b0b12;color:#fff;font-family:'Barlow',sans-serif;overflow:hidden;cursor:none;}

/* cursor */
.cur-dot{position:fixed;width:8px;height:8px;background:#E8163A;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cur-ring{position:fixed;width:34px;height:34px;border:1.5px solid rgba(232,22,58,.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;}

/* ── page shell ── */
.page{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;}

/* ── solar system bg ── */
.page-bg{position:absolute;inset:0;z-index:0;overflow:hidden;}
.page-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 55% at 15% 25%,rgba(232,22,58,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 85% 75%,rgba(26,43,143,.10) 0%,transparent 60%);}
.sol-stars{position:absolute;inset:0;background-image:radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.25) 0%,transparent 100%),radial-gradient(1px 1px at 28% 72%,rgba(255,255,255,.18) 0%,transparent 100%),radial-gradient(1px 1px at 45% 35%,rgba(255,255,255,.22) 0%,transparent 100%),radial-gradient(1px 1px at 62% 85%,rgba(255,255,255,.15) 0%,transparent 100%),radial-gradient(1px 1px at 75% 22%,rgba(255,255,255,.2) 0%,transparent 100%),radial-gradient(1px 1px at 88% 58%,rgba(255,255,255,.17) 0%,transparent 100%),radial-gradient(1px 1px at 35% 90%,rgba(255,255,255,.13) 0%,transparent 100%),radial-gradient(1px 1px at 92% 8%,rgba(255,255,255,.2) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 18% 45%,rgba(255,255,255,.12) 0%,transparent 100%),radial-gradient(1px 1px at 80% 40%,rgba(255,255,255,.15) 0%,transparent 100%);}
.sol-orbit{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.06);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.sol-orbit::after{content:'';position:absolute;border-radius:50%;top:0;left:50%;transform:translate(-50%,-50%);}
.sol-o1{width:220px;height:220px;}.sol-o1::after{width:5px;height:5px;background:rgba(255,200,100,.5);}
.sol-o2{width:380px;height:380px;border-color:rgba(255,255,255,.05);}.sol-o2::after{width:6px;height:6px;background:rgba(180,200,255,.45);}
.sol-o3{width:560px;height:560px;border-color:rgba(255,255,255,.04);}.sol-o3::after{width:5px;height:5px;background:rgba(150,180,255,.35);}
.sol-o4{width:750px;height:750px;border-color:rgba(255,255,255,.03);}.sol-o4::after{width:7px;height:7px;background:rgba(255,160,100,.3);}
.sol-o5{width:960px;height:960px;border-color:rgba(255,255,255,.02);}.sol-o5::after{width:5px;height:5px;background:rgba(200,220,255,.25);}
.sol-belt{position:absolute;width:660px;height:660px;border-radius:50%;border:1px dashed rgba(255,255,255,.04);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}

/* ── nav ── */
.nav{position:relative;z-index:20;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:16px clamp(24px,4vw,56px);}
.nav-logo{font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;letter-spacing:3px;text-transform:uppercase;color:#fff;text-decoration:none;}
.nav-logo em{color:#E8163A;font-style:normal;}
.nav-filters{display:flex;align-items:center;gap:24px;}
.nav-f{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);background:none;border:none;cursor:pointer;transition:color .2s;position:relative;padding-bottom:3px;}
.nav-f::after{content:'';position:absolute;bottom:0;left:0;right:100%;height:1px;background:#E8163A;transition:right .28s cubic-bezier(.22,1,.36,1);}
.nav-f:hover{color:rgba(255,255,255,.7);}
.nav-f.on{color:#fff;}
.nav-f.on::after{right:0;}
.nav-back{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35);text-decoration:none;cursor:pointer;transition:color .2s;}
.nav-back:hover{color:#fff;}
.nav-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

/* ── carousel ── */
.track{position:relative;width:100%;height:100%;transform-style:preserve-3d;display:flex;align-items:center;justify-content:center;}

/* card sized relative to viewport height so it never overflows at full view */
.card{
  position:absolute;
  width:clamp(240px,min(30vw,42vh),380px);
  height:clamp(240px,min(30vw,42vh),380px);
  cursor:pointer;overflow:hidden;
  will-change:transform,opacity,filter;
  transition:transform .5s cubic-bezier(.22,1,.36,1),opacity .4s ease,filter .4s ease,box-shadow .4s ease;
}

/* four red corner squares on active card */
.card::before,.card::after,
.card .corner-bl,.card .corner-br{
  content:'';position:absolute;width:10px;height:10px;background:#E8163A;
  opacity:0;transition:opacity .4s ease;z-index:20;pointer-events:none;
}
.card::before{top:-5px;left:-5px;}
.card::after{top:-5px;right:-5px;}
.card .corner-bl{bottom:-5px;left:-5px;}
.card .corner-br{bottom:-5px;right:-5px;}
.card[data-pos="0"]::before,.card[data-pos="0"]::after,
.card[data-pos="0"] .corner-bl,.card[data-pos="0"] .corner-br{opacity:1;}

/* center card — overflow visible so corners can bleed outside */
.card[data-pos="0"]{
  transform:translateX(0) translateZ(0) rotateY(0deg) scale(1);
  opacity:1;filter:brightness(1.05);z-index:10;
  box-shadow:0 0 40px rgba(232,22,58,.25),0 28px 70px rgba(0,0,0,.8);
  outline:1px solid rgba(232,22,58,.35);
  overflow:visible;
}

.card[data-pos="1"]{
  transform:translateX(var(--peek)) translateZ(-80px) rotateY(-12deg) scale(.82);
  opacity:.7;filter:brightness(.65);z-index:5;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
}
.card[data-pos="-1"]{
  transform:translateX(calc(-1 * var(--peek))) translateZ(-80px) rotateY(12deg) scale(.82);
  opacity:.7;filter:brightness(.65);z-index:5;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
}
.card[data-pos="2"],.card[data-pos="-2"],.card[data-pos="3"],.card[data-pos="-3"],.card[data-pos="99"]{
  opacity:0;pointer-events:none;z-index:0;
  transform:translateX(0) scale(.4);transition:none;
}
.carousel{--peek:clamp(240px,30vw,400px);}
.carousel{flex:1;position:relative;z-index:10;display:flex;align-items:center;justify-content:center;overflow:hidden;perspective:1200px;perspective-origin:50% 50%;padding-bottom:0;}
.card-bg{position:absolute;inset:0;transition:transform .5s cubic-bezier(.22,1,.36,1);display:none;}
.card-logo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-logo img{width:100%;height:100%;object-fit:contain;display:block;}
.card-logo svg{display:block;}

/* ── bottom ── */
.bottom{position:relative;z-index:20;flex-shrink:0;text-align:center;padding:0 24px clamp(20px,3vh,40px);margin-top:-8px;}
.bt{transition:opacity .35s ease,transform .35s ease;}
.bt.out{opacity:0;transform:translateY(8px);}
.b-cat{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:#E8163A;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:12px;}
.b-cat::before,.b-cat::after{content:'';width:24px;height:1px;background:#E8163A;}
.b-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(24px,3vw,44px);text-transform:uppercase;letter-spacing:2px;line-height:1.1;color:#fff;margin-bottom:12px;}
.b-desc{font-size:clamp(12px,1vw,14px);font-weight:300;color:rgba(255,255,255,.35);line-height:1.8;max-width:480px;margin:0 auto 20px;}
.b-nav{display:flex;align-items:center;justify-content:center;gap:16px;}
.b-arr{width:36px;height:36px;border:1px solid rgba(255,255,255,.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;}
.b-arr:hover{border-color:rgba(232,22,58,.5);background:rgba(232,22,58,.08);}
.b-arr svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2;}
.view-btn{position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:9px;padding:12px 28px;background:#E8163A;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:3px;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s,transform .15s,box-shadow .2s;}
.view-btn::before{content:'';position:absolute;top:0;left:-80%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);transform:skewX(-16deg);transition:left .5s cubic-bezier(.22,1,.36,1);}
.view-btn:hover::before{left:130%;}
.view-btn:hover{background:#C0102E;transform:translateY(-1px);box-shadow:0 6px 22px rgba(232,22,58,.5);}
.view-btn svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2.5;}

/* ══════════════════════════════════════
   PROJECT DETAIL OVERLAY
══════════════════════════════════════ */
.detail-overlay{
  position:fixed;inset:0;z-index:500;
  background:#0b0b12;
  overflow-y:auto;
  opacity:0;pointer-events:none;
  transform:translateY(40px);
  transition:opacity .45s cubic-bezier(.22,1,.36,1),transform .45s cubic-bezier(.22,1,.36,1);
}
.detail-overlay.open{
  opacity:1;pointer-events:all;
  transform:translateY(0);
}

/* detail nav */
.d-nav{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px clamp(24px,5vw,64px);
  background:rgba(11,11,18,.88);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.d-nav-logo{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;letter-spacing:3px;text-transform:uppercase;color:#fff;text-decoration:none;}
.d-nav-logo em{color:#E8163A;font-style:normal;}
.d-back{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);background:none;border:none;cursor:pointer;transition:color .2s;}
.d-back:hover{color:#fff;}
.d-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

/* detail hero */
.d-hero{
  min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 clamp(24px,5vw,64px) clamp(48px,7vh,80px);
  padding-top:80px;position:relative;overflow:hidden;
}
.d-hero-bg{position:absolute;inset:0;z-index:0;}
.d-hero-grid{position:absolute;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:60px 60px;}
.d-hero-logo{position:absolute;right:clamp(24px,6vw,80px);bottom:clamp(48px,7vh,80px);width:clamp(130px,16vw,220px);height:clamp(130px,16vw,220px);z-index:2;border:1px solid rgba(255,255,255,.08);overflow:hidden;}
.d-hero-logo img{width:100%;height:100%;object-fit:contain;display:block;}
.d-hero-content{position:relative;z-index:2;}
.d-eyebrow{display:flex;align-items:center;gap:12px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:#E8163A;margin-bottom:24px;}
.d-eyebrow::before{content:'';width:28px;height:1px;background:#E8163A;}
.d-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(52px,9vw,130px);text-transform:uppercase;letter-spacing:-2px;line-height:.88;color:#fff;margin-bottom:28px;}
.d-title .outline{-webkit-text-stroke:1.5px rgba(255,255,255,.3);color:transparent;}
.d-desc-hero{font-size:clamp(13px,1vw,15px);font-weight:300;color:rgba(255,255,255,.45);line-height:1.85;max-width:560px;margin-bottom:36px;}
.d-meta{display:flex;align-items:stretch;gap:0;border:1px solid rgba(255,255,255,.08);width:fit-content;}
.d-meta-item{display:flex;flex-direction:column;gap:4px;padding:14px 24px;border-right:1px solid rgba(255,255,255,.08);}
.d-meta-item:last-child{border-right:none;}
.d-meta-item .m-val{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:1px;}
.d-meta-item .m-key{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);}

/* detail sections */
.d-section{padding:clamp(56px,7vh,90px) clamp(24px,5vw,64px);border-top:1px solid rgba(255,255,255,.06);}
.d-section-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:#E8163A;margin-bottom:40px;display:flex;align-items:center;gap:12px;}
.d-section-label::before{content:'';width:24px;height:1px;background:#E8163A;}

/* split */
.d-split{display:grid;grid-template-columns:1fr 1fr;gap:clamp(36px,5vw,72px);align-items:start;}
.d-split-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(28px,3vw,46px);text-transform:uppercase;letter-spacing:-1px;line-height:.95;color:#fff;margin-bottom:20px;}
.d-split-body{font-size:13px;font-weight:300;color:rgba(255,255,255,.4);line-height:1.85;}
.d-split-body p+p{margin-top:14px;}
.d-tag-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:28px;}
.d-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(232,22,58,.7);padding:5px 14px;border:1px solid rgba(232,22,58,.22);}

/* gallery */
.d-gallery{display:grid;gap:2px;}
.d-gallery.cols-2{grid-template-columns:1fr 1fr;}
.d-gallery-item{overflow:hidden;position:relative;background:#111118;aspect-ratio:4/3;}
.d-gallery-item.wide{grid-column:1/-1;aspect-ratio:16/7;}
.d-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.d-placeholder svg{width:28px;height:28px;opacity:.15;}
.d-placeholder span{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.12);}

/* deliverables */
.d-deliverables{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);}
.d-del-item{background:#0b0b12;padding:32px 28px;transition:background .3s;position:relative;overflow:hidden;}
.d-del-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#E8163A;transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.22,1,.36,1);}
.d-del-item:hover{background:#0f0f1a;}
.d-del-item:hover::before{transform:scaleX(1);}
.d-del-num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(232,22,58,.5);margin-bottom:14px;display:block;}
.d-del-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:1px;text-transform:uppercase;color:#fff;margin-bottom:8px;}
.d-del-desc{font-size:12px;font-weight:300;color:rgba(255,255,255,.35);line-height:1.7;}

/* next project */
.d-next{padding:clamp(56px,7vh,90px) clamp(24px,5vw,64px);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;gap:24px;cursor:pointer;transition:background .3s;position:relative;overflow:hidden;}
.d-next::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:#E8163A;transform:scaleX(0);transform-origin:left;transition:transform .5s cubic-bezier(.22,1,.36,1);}
.d-next:hover{background:rgba(232,22,58,.03);}
.d-next:hover::before{transform:scaleX(1);}
.d-next-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:10px;}
.d-next-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(26px,3.5vw,50px);text-transform:uppercase;letter-spacing:-1px;line-height:.95;color:#fff;}
.d-next-arrow{width:52px;height:52px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,border-color .2s;}
.d-next:hover .d-next-arrow{background:#E8163A;border-color:#E8163A;}
.d-next-arrow svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.5;}
</style>
</head>
<body>
<div class="cur-dot" id="curDot"></div>
<div class="cur-ring" id="curRing"></div>

<!-- ══ CAROUSEL PAGE ══ -->
<div class="page" id="mainPage">
  <div class="page-bg">
    <div class="sol-stars"></div>
    <div class="sol-belt"></div>
    <div class="sol-orbit sol-o3"></div>
    <div class="sol-orbit sol-o4"></div>
    <div class="sol-orbit sol-o5"></div>
  </div>
  <div class="nav">
    <a class="nav-logo" href="portfolio.html"><img src="../assets/prsn/PRSN/Artboard 1.png" style="height: 60px;" alt="PRSN Studio"></a>
    <div class="nav-filters">
      <button class="nav-f on" data-f="all">All</button>
      <button class="nav-f" data-f="brand">Brand</button>
      <button class="nav-f" data-f="web">Web</button>
      <button class="nav-f" data-f="ui">UI/UX</button>
    </div>
    <a class="nav-back" href="portfolio.html">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
  </div>
  <div class="carousel" id="carousel">
    <div class="track" id="track"></div>
  </div>
  <div class="bottom">
    <p class="b-cat bt" id="bCat">IT Company</p>
    <h2 class="b-title bt" id="bTitle">PRSN</h2>
    <p class="b-desc bt" id="bDesc">Loading...</p>
    <div class="b-nav">
      <button class="b-arr" id="arrL"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="view-btn" id="viewBtn">
        View Project
        <svg viewBox="0 0 24 24"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>
      </button>
      <button class="b-arr" id="arrR"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>
    </div>
  </div>
</div>

<!-- ══ PROJECT DETAIL OVERLAY ══ -->

/* ── carousel logic ── */
let pool=[...ALL],active=0,busy=false;
function wrap(i){return((i%pool.length)+pool.length)%pool.length;}

function mkBg(p,i){
  const configs=[
    `background:${p.color};background-image:radial-gradient(ellipse 100% 80% at 0% 100%,${p.accent}90 0%,${p.accent}40 25%,transparent 55%),radial-gradient(ellipse 70% 60% at 100% 0%,${p.accent2}55 0%,transparent 50%)`,
    `background:${p.color};background-image:radial-gradient(ellipse 85% 85% at 50% 55%,${p.accent}75 0%,${p.accent}30 35%,transparent 60%),radial-gradient(ellipse 50% 45% at 85% 10%,${p.accent2}60 0%,transparent 45%)`,
    `background:${p.color};background-image:radial-gradient(ellipse 90% 70% at 10% 15%,${p.accent}85 0%,transparent 50%),radial-gradient(ellipse 70% 80% at 90% 90%,${p.accent2}65 0%,transparent 50%)`,
    `background:${p.color};background-image:radial-gradient(ellipse 110% 60% at 50% 0%,${p.accent}80 0%,${p.accent}35 30%,transparent 55%),radial-gradient(ellipse 60% 50% at 80% 100%,${p.accent2}55 0%,transparent 50%)`,
    `background:${p.color};background-image:radial-gradient(ellipse 60% 100% at 0% 50%,${p.accent}85 0%,${p.accent}30 30%,transparent 55%),radial-gradient(ellipse 80% 80% at 100% 50%,${p.accent2}50 0%,transparent 55%)`,
  ];
  return configs[i%configs.length];
}

function buildCards(){
  const track=document.getElementById('track');
  track.innerHTML='';
  pool.forEach((p,i)=>{
    const c=document.createElement('div');
    c.className='card';
    c.innerHTML=`<div class="card-bg" style="${mkBg(p,i)}"></div><div class="card-logo" style="background:${p.cardBg||'#0d0d14'}">${LOGOS[i]||''}</div><span class="corner-bl"></span><span class="corner-br"></span>`;
    c.addEventListener('click',()=>{
      const pos=parseInt(c.dataset.pos||'99');
      if(pos===1) go(wrap(active+1));
      if(pos===-1) go(wrap(active-1));
    });
    track.appendChild(c);
  });
  position();
  updateBottom(true);
}

function position(){
  document.querySelectorAll('.card').forEach((c,i)=>{
    let rel=i-active;
    if(rel>pool.length/2) rel-=pool.length;
    if(rel<-pool.length/2) rel+=pool.length;
    c.dataset.pos=Math.abs(rel)<=1?rel:99;
  });
}

function updateBottom(instant){
  const p=pool[active];
  const els=document.querySelectorAll('.bt');
  if(!instant) els.forEach(e=>e.classList.add('out'));
  setTimeout(()=>{
    document.getElementById('bCat').textContent=p.label;
    document.getElementById('bTitle').textContent=p.title;
    document.getElementById('bDesc').textContent=p.desc;
    els.forEach(e=>e.classList.remove('out'));
  },instant?0:180);
}

function go(i){
  if(busy)return;
  i=wrap(i);if(i===active)return;
  busy=true;active=i;position();updateBottom(false);
  setTimeout(()=>{busy=false;},580);
}

document.getElementById('arrL').addEventListener('click',()=>go(active-1));
document.getElementById('arrR').addEventListener('click',()=>go(active+1));
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') go(active-1);
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(active+1);
  if(e.key==='Escape') closeDetail();
});

let wBuf=0,wT=null;
window.addEventListener('wheel',e=>{
  if(document.getElementById('detailOverlay').classList.contains('open')) return;
  e.preventDefault();wBuf+=e.deltaY;clearTimeout(wT);
  wT=setTimeout(()=>{if(Math.abs(wBuf)>50){wBuf>0?go(active+1):go(active-1);}wBuf=0;},80);
},{passive:false});

let dx=0,dragging=false;
const car=document.getElementById('carousel');
car.addEventListener('mousedown',e=>{dragging=true;dx=e.clientX;});
window.addEventListener('mouseup',e=>{
  if(!dragging)return;dragging=false;
  const d=dx-e.clientX;
  if(Math.abs(d)>60){d>0?go(active+1):go(active-1);}
});

document.querySelectorAll('.nav-f').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-f').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    const f=btn.dataset.f;
    pool=f==='all'?[...ALL]:ALL.filter(p=>p.cat===f);
    active=0;busy=false;buildCards();
  });
});

}

function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow='';
}

/* ── cursor ── */
const dot=document.getElementById('curDot'),ring=document.getElementById('curRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
(function tick(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tick);})();

buildCards();
</script>
